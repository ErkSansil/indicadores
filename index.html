<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planilhas R&S AMO</title>

    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Ícone -->
    <link rel="icon" type="image/png" href="Imagens/LOGO_AMO_BRANCO.png">
</head>

<body>

    <div class="container">

        <a href="#" class="item" data-link="https://docs.google.com/spreadsheets/d/1_NjVXpex5m2rASK9yAx9FDcC57Bor2nbdXZ0jjzMuKQ/edit?gid=1099626865#gid=1099626865">
            INDICADORES COMERCIAL SEDE
        </a>

        <a href="#" class="item" data-link="https://docs.google.com/spreadsheets/d/168zunS5E4R-buMj1OV6GQkeDSLTaQjg79PIvEqkbHeg/edit?gid=1099626865#gid=1099626865">
            INDICADORES COMERCIAL FILIAL
        </a>

        <a href="#" class="item" data-link="https://docs.google.com/spreadsheets/d/13ph6EawN2I7jikPcWz-6pQpFqcg7MzfLxWIV-MSEDtY/edit?gid=1099626865#gid=1099626865">
            INDICADORES ADMINISTRATIVO
        </a>

        <a href="#" class="item" data-link="https://docs.google.com/spreadsheets/d/1k0DofYbFNrz1bY2Kwv8K2TcvK-igUNwfTWkM10tK5PQ/edit?gid=1099626865#gid=1099626865">
            INDICADORES FINANCEIRO
        </a>

        <a href="#" class="item destaque" data-link="https://docs.google.com/spreadsheets/d/1urf1HbMLLaXNrFvY4tKJoTsG7x6sejICaWKGVQmZIgM/edit?gid=1733671439#gid=1733671439">
            Indicadores de Recrutamento (R&S) GERAL
        </a>

    </div>

    <!-- JS -->
    <script>
        document.querySelectorAll('.item').forEach(el => {
            el.addEventListener('click', (e) => {
                e.preventDefault();

                const link = el.getAttribute('data-link');

                // codifica e decodifica (pra mascarar)
                const encoded = btoa(link);
                const decoded = atob(encoded);

                window.open(decoded, '_blank');
            });
        });
    </script>

</body>
</html>
